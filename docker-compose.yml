services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: operations_dashboard
    ports:
      - "8501:8501"
    volumes:
      # Persist the SQLite database outside the container
      - db_data:/data
    environment:
      - DB_PATH=/data/customer.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db_data:
    driver: local